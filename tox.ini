[tox]
# https://docs.djangoproject.com/en/stable/faq/install/#what-python-version-can-i-use-with-django
envlist =
    py{310,311,312}-dj42
    py{310,311,312}-dj50
    py{310,311,312,313}-dj51
    py{310,311,312,313,314}-dj52
    py{312,313,314}-dj60
    py{312,313,314}-djmain
    docs

[testenv]
usedevelop = true
extras = tests
commands =
    python -Wd {envbindir}/coverage run tests/manage.py test -v2 --keepdb {posargs:myapp}
    coverage report -m
deps =
    dj42: Django>=4.2,<5.0
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<6.0
    dj60: Django>=6.0,<6.1
    djmain: https://github.com/django/django/archive/main.tar.gz
    model-bakery

[testenv:docs]
deps =
    Sphinx
    sphinx-rtd-theme
    Django
    django-js-asset
changedir = docs
commands = make html
skip_install = true
allowlist_externals = make
